naftiko: "1.0.0-alpha1"

info:
  label: "Amazon EC2 Auto Scaling Auto Scaling Group Management"
  description: "Unified capability for managing EC2 Auto Scaling groups, scaling policies, and lifecycle hooks for cloud operations engineers."
  tags:
    - Amazon EC2 Auto Scaling
    - AWS
    - Compute
    - Auto Scaling
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY

capability:
  consumes:
    - import: ec2-auto-scaling
      location: ./shared/ec2-auto-scaling.yaml

  exposes:
    - type: rest
      port: 8087
      namespace: ec2-auto-scaling-api
      description: "Unified REST API for Auto Scaling Group Management."
      resources:
        - path: /v1/resource
          name: GET_AttachInstances
          description: "Amazon EC2 Auto Scaling GET_ Attach Instances"
          operations:
            - method: GET
              name: GET_AttachInstances
              description: "Amazon EC2 Auto Scaling GET_ Attach Instances"
              call: "ec2-auto-scaling.GET_AttachInstances"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/resource
          name: POST_AttachInstances
          description: "Amazon EC2 Auto Scaling POST_ Attach Instances"
          operations:
            - method: POST
              name: POST_AttachInstances
              description: "Amazon EC2 Auto Scaling POST_ Attach Instances"
              call: "ec2-auto-scaling.POST_AttachInstances"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/resource
          name: GET_AttachLoadBalancerTargetGroups
          description: "Amazon EC2 Auto Scaling GET_ Attach Load Balancer Target Groups"
